name: Atualização Diária do Dashboard

on:
  schedule:
    # Executa todo dia às 6:00 AM UTC (3:00 AM horário de Brasília)
    - cron: '0 6 * * *'
  workflow_dispatch: # Permite execução manual
  push:
    branches: [main]

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositório
        uses: actions/checkout@v3
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          
      - name: Instalar dependências
        run: |
          pip install requests beautifulsoup4 pandas gspread oauth2client playwright
          playwright install chromium
          
      - name: Executar coleta de dados
        env:
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          GOOGLE_SHEETS_CREDS: ${{ secrets.GOOGLE_SHEETS_CREDS }}
        run: |
          python scripts/collect_data.py
          
      - name: Gerar dashboard atualizado
        run: |
          python scripts/generate_dashboard.py
          
      - name: Commit e Push das mudanças
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/ private/
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Atualização automática $(date +'%Y-%m-%d %H:%M')" && git push)
          
      - name: Deploy para GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./private
